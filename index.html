<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오늘 뭐 먹지?</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>오늘 뭐 먹지?</h1>
      <p class="description">쉼표(,)로 메뉴를 입력하고 랜덤 추천을 받아보세요.</p>

      <label for="menuInput" class="label">메뉴 목록</label>
      <textarea
        id="menuInput"
        rows="4"
        aria-label="메뉴 목록 입력"
      >김밥, 라면, 비빔밥, 돈까스, 떡볶이, 초밥</textarea>

      <div class="actions">
        <button id="pickButton" type="button">랜덤 추천!</button>
        <button id="resetButton" type="button" class="secondary">초기화</button>
      </div>

      <section class="result-card" aria-live="polite">
        <h2>추천 메뉴</h2>
        <p id="result">버튼을 눌러 추천을 받아보세요 🍽️</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
